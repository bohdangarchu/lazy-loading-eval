# Environment config — edit this file to switch between local and remote setups.
#
# Local example (default):
#   registry: "localhost:5000"
#   tdfs_home_dir: "~/.2dfs"
#   tmpdir: null
#   tdfs_binary: "./tdfs"
#   full_cache_wipe: false
#
# Remote TUM VM example:
#   registry: "131.159.25.169:5000"
#   tdfs_home_dir: null
#   tmpdir: null
#   tdfs_binary: "tdfs"
#   full_cache_wipe: true
# Cloudlab example:
#   registry: "10.10.1.2:5000"
#   tdfs_home_dir: "/mydata/.2dfs"
#   tmpdir: "/mydata/tmp"
#   tdfs_binary: "tdfs"
#   full_cache_wipe: true

registry: "131.159.25.169:5000"

# Path to the 2dfs home directory. Used for cache clearing and passed as --home-dir to tdfs.
# null = don't pass --home-dir (tdfs uses its default); also falls back to ~/.2dfs for cache clearing.
tdfs_home_dir: null

# TMPDIR to set for tdfs subprocesses. null = use system default.
tmpdir: null

# tdfs binary to use.
# "./tdfs" means relative to the calling script's directory (local dev binary).
# "tdfs"   means global binary on PATH, invoked with sudo.
tdfs_binary: "tdfs"

# If true: fully wipe stargz cache + remove all nerdctl/ctr images + restart containerd.
# If false: selective cleanup that preserves tdfs-registry images (safe for local dev).
full_cache_wipe: true
