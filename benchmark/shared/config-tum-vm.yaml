# Environment config — edit this file to switch between local and remote setups.

registry: "131.159.25.169:5000"

# Path to the 2dfs home directory. Used for cache clearing and passed as --home-dir to tdfs.
# null = don't pass --home-dir (tdfs uses its default); also falls back to ~/.2dfs for cache clearing.
tdfs_home_dir: null

# TMPDIR to set for tdfs subprocesses. null = use system default.
tmpdir: null

# tdfs binary to use.
# "./tdfs" means relative to the calling script's directory (local dev binary).
# "tdfs"   means global binary on PATH, invoked with sudo.
tdfs_binary: "tdfs"

build_cooldown: 5
pull_cooldown: 5

# build_performance/measure.py
build_max_splits: 10
build_n_runs: 3
build_with_resource: true

# build_performance/measure_rebuild.py
rebuild_n_splits: 10
rebuild_n_runs: 3
rebuild_r_values: [2, 4, 6, 8, 10]

# pull_performance/measure.py
pull_n_splits: 10
pull_base_splits: [2, 4, 6, 8, 10]
pull_n_runs: 3

# pull_performance/measure_refresh.py
refresh_n_splits: 4
refresh_n_runs: 1

# pull_performance/measure_stargz_config.py
stargz_config_n_splits: 10
stargz_config_base_splits: [2, 4, 6, 8, 10]
stargz_config_n_runs: 3