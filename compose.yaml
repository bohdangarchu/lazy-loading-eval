version: "3.8"

services:
  registry:
    image: registry:2
    container_name: registry
    ports:
      - "5000:5000"

  prepopulate:
    build:
      context: .
      dockerfile: Dockerfile.prepopulate
    privileged: true
    image: prepopulate-registry:local
    container_name: prepopulate-registry
    depends_on:
      - registry
    restart: "no"

  benchmark:
    build:
      context: .
      dockerfile: Dockerfile
    image: stargz-eval
    container_name: stargz-eval
    privileged: true

    tmpfs:
      - /tmp:exec,mode=777
    devices:
      - /dev/fuse

    volumes:
      - containerd-data:/var/lib/containerd
      - stargz-data:/var/lib/containerd-stargz-grpc

    depends_on:
      - prepopulate

    command: sleep infinity

volumes:
  containerd-data:
  stargz-data:
